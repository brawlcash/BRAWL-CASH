<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Entradas Brawl</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
  background: #111;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px #ff00ff; }
  to { box-shadow: 0 0 20px #00ffff; }
}

.container {
  max-width: 500px;
  margin: 30px auto;
  padding: 20px;
  background: #1f1f35;
  border-radius: 12px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #ff00ff;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #00ffff;
  color: black;
}

.card {
  margin-top: 15px;
  padding: 10px;
  background: #2a2a44;
  border-radius: 8px;
}

.counter {
  font-size: 18px;
  margin-top: 10px;
  text-align: center;
}
</style>
</head>

<body>

<header>🔥 PAINEL BRAWL ENTRADAS 🔥</header>

<div class="container">

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="nick" placeholder="Nick no Brawl">

<button onclick="entrar()">ENTRAR</button>

<div class="counter" id="total">Total de entradas: 0</div>

<div id="lista"></div>

</div>

<script>
let totalEntradas = 0;
let jogadores = {};

function entrar() {
  let nome = document.getElementById("nome").value;
  let tel = document.getElementById("telefone").value;
  let nick = document.getElementById("nick").value;

  if (!nome || !tel || !nick) return;

  let key = nome + tel;

  if (!jogadores[key]) {
    jogadores[key] = { entradas: 0, partidas: 0 };
  }

  jogadores[key].entradas++;

  // simulação de partidas jogadas
  jogadores[key].partidas++;

  if (jogadores[key].partidas >= 10) {
    jogadores[key].entradas++; // bônus
    jogadores[key].partidas = 0;
  }

  totalEntradas++;

  document.getElementById("total").innerText =
    "Total de entradas: " + totalEntradas;

  let div = document.createElement("div");
  div.className = "card";
  div.innerHTML =
    "👤 " + nome +
    "<br>📱 " + tel +
    "<br>🎮 " + nick +
    "<br>🎟 Entradas: " + jogadores[key].entradas;

  document.getElementById("lista").appendChild(div);
}
</script>

</body>
</html>
