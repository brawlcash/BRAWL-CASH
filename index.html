<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRAWL CASH</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: white;
    }

    header {
      text-align: center;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      color: #38bdf8;
      background: #020617;
      position: sticky;
      top: 0;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    h3 {
      margin-top: 0;
      font-size: 18px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin: 6px 0;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 16px;
      margin-top: 8px;
    }

    button:active {
      background: #16a34a;
    }

    .user {
      background: #020617;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 14px;
    }

    .paid {
      color: #22c55e;
      font-weight: bold;
    }

    .notpaid {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>BRAWL CASH 💰</header>

<div class="container">

  <div class="card">
    <h3>Inscrição</h3>

    <input id="nome" placeholder="Seu nome">
    <input id="nick" placeholder="Nick no Brawl">

    <button onclick="inscrever()">Cadastrar</button>
    <p id="msg"></p>
  </div>

  <div class="card">
    <h3>Pagamentos</h3>
    <div id="lista"></div>
  </div>

</div>

<script>
function carregar() {
  let dados = JSON.parse(localStorage.getItem("users")) || [];
  let lista = document.getElementById("lista");

  lista.innerHTML = "";

  dados.forEach((u, i) => {
    lista.innerHTML += `
      <div class="user">
        ${u.nome} (${u.nick})<br>
        <span class="${u.pago ? 'paid' : 'notpaid'}">
          ${u.pago ? 'Pago' : 'Não pago'}
        </span>
        <br>
        <button onclick="pagar(${i})">Marcar como pago</button>
      </div>
    `;
  });
}

function inscrever() {
  let nome = document.getElementById("nome").value;
  let nick = document.getElementById("nick").value;

  if(!nome || !nick){
    document.getElementById("msg").innerText = "Preenche tudo direito";
    return;
  }

  let dados = JSON.parse(localStorage.getItem("users")) || [];

  dados.push({nome, nick, pago: false});

  localStorage.setItem("users", JSON.stringify(dados));

  document.getElementById("msg").innerText = "Cadastrado!";
  carregar();
}

function pagar(i) {
  let dados = JSON.parse(localStorage.getItem("users"));
  dados[i].pago = true;
  localStorage.setItem("users", JSON.stringify(dados));
  carregar();
}

carregar();
</script>

</body>
</html>
