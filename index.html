<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAWL CASH</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  padding:15px;
  text-align:center;
  background:#020617;
  font-weight:bold;
}

.container{
  padding:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  margin-top:5px;
}

.user{
  background:#020617;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
}

.small{
  display:flex;
  gap:5px;
  margin-top:5px;
}

.small button{
  flex:1;
  background:#334155;
}

.pago{color:#22c55e;}
.nao{color:#ef4444;}
</style>
</head>

<body>

<header>BRAWL CASH</header>

<div class="container">

<div class="card">
  <input id="nome" placeholder="Nome">
  <input id="nick" placeholder="Nick">
  <button onclick="add()">Cadastrar</button>
  <p id="msg"></p>
</div>

<div class="card">
  <div id="lista"></div>
</div>

</div>

<script>
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || [];
}

function saveUsers(data){
  localStorage.setItem("users", JSON.stringify(data));
}

function render(){
  const lista = document.getElementById("lista");
  const users = getUsers();

  lista.innerHTML = "";

  users.forEach((u,i)=>{
    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      ${u.nome} (${u.nick})<br>
      <span class="${u.pago ? 'pago' : 'nao'}">
        ${u.pago ? 'Pago' : 'Não pago'}
      </span>
      <div class="small">
        <button onclick="toggle(${i})">Trocar</button>
        <button onclick="removeUser(${i})">Remover</button>
      </div>
    `;

    lista.appendChild(div);
  });
}

function add(){
  const nome = document.getElementById("nome").value.trim();
  const nick = document.getElementById("nick").value.trim();
  const msg = document.getElementById("msg");

  if(!nome || !nick){
    msg.innerText = "Preenche tudo";
    return;
  }

  const users = getUsers();
  users.push({nome, nick, pago:false});
  saveUsers(users);

  document.getElementById("nome").value="";
  document.getElementById("nick").value="";
  msg.innerText="OK";

  render();
}

function toggle(i){
  const users = getUsers();
  users[i].pago = !users[i].pago;
  saveUsers(users);
  render();
}

function removeUser(i){
  const users = getUsers();
  users.splice(i,1);
  saveUsers(users);
  render();
}

render();
</script>

</body>
</html>
