 <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAWL CASH</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

/* topo igual app */
header {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  border-bottom: 1px solid #1e293b;
}

/* container */
.container {
  padding: 15px;
}

/* caixas estilo clean */
.card {
  background: #1e293b;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 12px;
}

/* título */
.card h3 {
  margin: 0 0 10px 0;
  font-size: 16px;
  color: #cbd5f5;
}

/* inputs estilo app */
input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 8px;
  background: #020617;
  color: white;
}

/* botão clean */
button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: white;
  font-size: 14px;
}

/* lista */
.user {
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
}

/* status */
.pago {
  color: #22c55e;
}

.nao {
  color: #ef4444;
}

/* botões pequenos */
.actions {
  display: flex;
  gap: 5px;
  margin-top: 5px;
}

.actions button {
  flex: 1;
  font-size: 12px;
  padding: 8px;
  background: #334155;
}
</style>
</head>

<body>

<header>BRAWL CASH</header>

<div class="container">

<div class="card">
  <h3>Inscrição</h3>
  <input id="nome" placeholder="Nome">
  <input id="nick" placeholder="Nick">
  <button onclick="add()">Cadastrar</button>
  <p id="msg"></p>
</div>

<div class="card">
  <h3>Lista</h3>
  <div id="lista"></div>
</div>

</div>

<script>
function get(){
  return JSON.parse(localStorage.getItem("users")) || [];
}

function save(data){
  localStorage.setItem("users", JSON.stringify(data));
}

function render(){
  let data = get();
  let lista = document.getElementById("lista");

  lista.innerHTML = "";

  data.forEach((u,i)=>{
    lista.innerHTML += `
      <div class="user">
        ${u.nome} (${u.nick})<br>
        <span class="${u.pago ? 'pago' : 'nao'}">
          ${u.pago ? 'Pago' : 'Não pago'}
        </span>

        <div class="actions">
          <button onclick="toggle(${i})">
            ${u.pago ? 'Desmarcar' : 'Pagar'}
          </button>
          <button onclick="del(${i})">Remover</button>
        </div>
      </div>
    `;
  });
}

function add(){
  let nome = nomeInput.value.trim();
  let nick = nickInput.value.trim();

  if(!nome || !nick){
    msg.innerText = "Preenche tudo";
    return;
  }

  let data = get();

  data.push({nome,nick,pago:false});
  save(data);

  nomeInput.value="";
  nickInput.value="";

  msg.innerText="OK";
  render();
}

function toggle(i){
  let data = get();
  data[i].pago = !data[i].pago;
  save(data);
  render();
}

function del(i){
  let data = get();
  data.splice(i,1);
  save(data);
  render();
}

render();
</script>

</body>
</html>
